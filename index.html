<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chạm Lì Xì – Mở Lộc Xuân 2026</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: url("back.png") no-repeat center center fixed;
    background-size: cover;
    text-align: center;
    color: white;
}

h1 {
    margin-top: 60px;
    font-size: 50px;
    text-shadow: 3px 3px 10px rgba(0,0,0,0.6);
}

.grid {
    display: flex;
    justify-content: center;
    gap: 70px;
    margin-top: 100px;
    flex-wrap: wrap;
}
.item {
    text-align: center;
}

.label {
    margin-top: 15px;
    font-size: 20px;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.6);
}
.red-envelope {
    width: 160px;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.red-envelope:hover {
    transform: scale(1.15);
}

.red-envelope.opened {
    opacity: 0.4;
    cursor: not-allowed;
}

.popup {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.4); /* trắng mờ */
    display: none;
    justify-content: center;
    align-items: center;
}
.popup-content {
    background: #ffffff;
    padding: 70px;
    border-radius: 25px;
    max-width: 850px;
    text-align: center;
    animation: popupZoom 0.4s ease;
    border: 6px solid #d4af37;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

/* Khi là LỘC VÀNG */
.popup-content.gold {
    background-color: #ffffff !important;
    border: 8px solid gold;
    box-shadow: 0 0 100px rgba(255,215,0,1);
    animation: popupZoom 0.4s ease, glowGold 1.2s infinite alternate;
}

.popup h2 {
    font-size: 48px;
    margin-bottom: 30px;
    color: #b30000;
    font-weight: bold;
}

.popup p {
    font-size: 30px;
    line-height: 1.6;
    color: #b30000;
}

.close-btn {
    margin-top: 35px;
    padding: 14px 35px;
    font-size: 22px;
    background: linear-gradient(45deg, #b30000, #ff0000);
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 10px;
    transition: 0.3s;
}

.close-btn:hover {
    transform: scale(1.1);
}

@keyframes popupZoom {
    from {transform: scale(0.7); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}

@keyframes glowGold {
    from {box-shadow: 0 0 40px rgba(255,215,0,0.6);}
    to {box-shadow: 0 0 120px rgba(255,215,0,1);}
}
@keyframes zoomIn {
    from {transform: scale(0.6); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}

#fireworks {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
}
</style>
</head>

<body onclick="startMusic()">
<canvas id="fireworks"></canvas>
<h1> VNPT THÁI NGUYÊN </h1>
<h1>🎉 CHẠM LÌ XÌ – MỞ LỘC XUÂN 🎉</h1>


<div class="grid">

    <div class="item">
        <img src="lixi.png" class="red-envelope" onclick="openLixi(0)">
        <div class="label">Tài Lộc</div>
    </div>
    
    <div class="item">
        <img src="lixi.png" class="red-envelope" onclick="openLixi(1)">
        <div class="label">May Mắn</div>
    </div>
    
    <div class="item">
        <img src="lixi.png" class="red-envelope" onclick="openLixi(2)">
        <div class="label">Thịnh Vượng</div>
    </div>
    
    <div class="item">
        <img src="lixi.png" class="red-envelope" onclick="openLixi(3)">
        <div class="label">Phát Đạt</div>
    </div>
    
    <div class="item">
        <img src="lixi.png" class="red-envelope" onclick="openLixi(4)">
        <div class="label">Vàng Son</div>
    </div>

</div>
    
<div class="popup" id="popup">
    <div class="popup-content">
        <h2 id="title"></h2>
        <p id="content"></p>
        <button class="close-btn" onclick="closePopup()">Đóng</button>
    </div>
</div>

<script>

// Danh sách phần thưởng
const prizes = [
{
title: "🎉 LỘC BỨT PHÁ 🎉",
content: "Xuân về khí thế dâng cao,<br>Đồng lòng bứt phá, tiến vào đỉnh cao."
},
{
title: "🎉 LỘC TIÊN PHONG 🎉",
content: "Xuân sang mở lối tiên phong,<br>Sáng tạo bứt phá, thành công rạng ngời."
},
{
title: "🎉 LỘC KẾT NỐI 🎉",
content: "Xuân này kết nối bền lâu,<br>Chung tay xây vững nhịp cầu niềm tin."
},
{
title: "🎉 LỘC ĐỒNG TÂM 🎉",
content: "Xuân về vững bước đồng tâm,<br>Chung lòng hiệp lực, nâng tầm thành công."
},
{
title: "🏆 LỘC VÀNG – 500.000đ 🏆",
content: "Xuân sang rực rỡ ánh vàng,<br>Tài lộc viên mãn, vững vàng thành công!"
}
];

// Hàm trộn mảng (shuffle)
function shuffle(array) {
for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
}
return array;
}

// Tạo mảng phần thưởng đã được random
const shuffledPrizes = shuffle([...prizes]);

let musicStarted = false;

function startMusic() {
    if (!musicStarted) {
        const bg = document.getElementById("bgMusic");
        bg.volume = 0.5;   // chỉnh âm lượng
        bg.play().catch(() => {});
        musicStarted = true;
    }
}

// ===== PHÁO HOA =====
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework(x, y) {
    for (let i = 0; i < 80; i++) {
        particles.push({
            x: x,
            y: y,
            angle: Math.random() * Math.PI * 2,
            speed: Math.random() * 6 + 2,
            radius: 3,
            alpha: 1,
            color: `hsl(${Math.random()*360},100%,50%)`
        });
    }
}

function updateFireworks() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p, index) => {
        p.x += Math.cos(p.angle) * p.speed;
        p.y += Math.sin(p.angle) * p.speed;
        p.alpha -= 0.02;

        ctx.globalAlpha = p.alpha;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();

        if (p.alpha <= 0) {
            particles.splice(index, 1);
        }
    });

    requestAnimationFrame(updateFireworks);
}

updateFireworks();
    
function openLixi(index) {

const envelopes = document.querySelectorAll('.red-envelope');
if (envelopes[index].classList.contains('opened')) return;

envelopes[index].classList.add('opened');

const reward = shuffledPrizes[index];

document.getElementById("title").innerHTML = reward.title;
document.getElementById("content").innerHTML = reward.content;

const popup = document.getElementById("popup");
const popupBox = document.querySelector(".popup-content");

popupBox.classList.remove("gold");

if (reward.title.includes("LỘC VÀNG")) {
    popupBox.classList.add("gold");
}

// 🎆 BẮN PHÁO HOA
createFirework(window.innerWidth/2, window.innerHeight/3);

popup.style.display = "flex";
}

function closePopup() {
document.getElementById("popup").style.display = "none";
}

</script>
    <audio id="bgMusic" loop>
    <source src="https://assets.mixkit.co/music/preview/mixkit-happy-celebration-128.mp3" type="audio/mpeg">
    </audio>
    <audio id="soundOpen" src="https://assets.mixkit.co/sfx/preview/mixkit-positive-notification-951.mp3"></audio>
    <audio id="soundGold" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>
</body>
</html>
