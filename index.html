<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chạm Lì Xì – Mở Lộc Xuân 2026</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: url("back.png") no-repeat center center fixed;
    background-size: cover;
    text-align: center;
    color: white;
}

.overlay {
    background: rgba(0,0,0,0.55);
    min-height: 100vh;
    padding-bottom: 60px;
}

h1 {
    padding-top: 50px;
    font-size: 50px;
    text-shadow: 2px 2px 10px black;
}

.grid {
    display: flex;
    justify-content: center;
    gap: 50px;
    flex-wrap: wrap;
    margin-top: 80px;
}

.red-envelope {
    width: 180px;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.red-envelope:hover {
    transform: scale(1.1);
}

.red-envelope.opened {
    filter: grayscale(100%);
    opacity: 0.5;
    cursor: not-allowed;
}

.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: white;
    color: #b30000;
    padding: 60px;
    border-radius: 15px;
    max-width: 800px;
    animation: zoomIn 0.5s ease;
}

.popup h2 {
    font-size: 42px;
    margin-bottom: 25px;
}

.popup p {
    font-size: 28px;
    line-height: 1.6;
}

.close-btn {
    margin-top: 30px;
    padding: 12px 30px;
    font-size: 20px;
    background: #b30000;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 8px;
}

@keyframes zoomIn {
    from {transform: scale(0.5); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}
</style>
</head>

<body>

<div class="overlay">

<h1>🎉 CHẠM LÌ XÌ – MỞ LỘC XUÂN 🎉</h1>

<div class="grid">
    <img src="lixi.png" class="red-envelope" onclick="openLixi(0)">
    <img src="lixi.png" class="red-envelope" onclick="openLixi(1)">
    <img src="lixi.png" class="red-envelope" onclick="openLixi(2)">
    <img src="lixi.png" class="red-envelope" onclick="openLixi(3)">
    <img src="lixi.png" class="red-envelope" onclick="openLixi(4)">
</div>

</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h2 id="title"></h2>
        <p id="content"></p>
        <button class="close-btn" onclick="closePopup()">Đóng</button>
    </div>
</div>

<script>
const prizes = [
{
title: "🎉 LỘC BỨT PHÁ 🎉",
content: "Xuân về khí thế dâng cao,<br>Đồng lòng bứt phá, tiến vào đỉnh cao."
},
{
title: "🎉 LỘC TIÊN PHONG 🎉",
content: "Xuân sang mở lối tiên phong,<br>Sáng tạo bứt phá, thành công rạng ngời."
},
{
title: "🎉 LỘC KẾT NỐI 🎉",
content: "Xuân này kết nối bền lâu,<br>Chung tay xây vững nhịp cầu niềm tin."
},
{
title: "🎉 LỘC ĐỒNG TÂM 🎉",
content: "Xuân về vững bước đồng tâm,<br>Chung lòng hiệp lực, nâng tầm thành công."
},
{
title: "🏆 LỘC VÀNG – 500.000đ 🏆",
content: "Xuân sang rực rỡ ánh vàng,<br>Tài lộc viên mãn, vững vàng thành công!"
}
];

function openLixi(index) {
    const envelopes = document.querySelectorAll('.red-envelope');
    if (envelopes[index].classList.contains('opened')) return;

    envelopes[index].classList.add('opened');

    document.getElementById("title").innerHTML = prizes[index].title;
    document.getElementById("content").innerHTML = prizes[index].content;
    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
