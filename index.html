<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chạm Lì Xì – Mở Lộc Xuân 2026</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: url("back.png") no-repeat center center fixed;
    background-size: cover;
    text-align: center;
    color: white;
}

h1 {
    margin-top: 60px;
    font-size: 50px;
    text-shadow: 3px 3px 10px rgba(0,0,0,0.6);
}

.grid {
    display: flex;
    justify-content: center;
    gap: 70px;
    margin-top: 100px;
    flex-wrap: wrap;
}

.red-envelope {
    width: 160px;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.red-envelope:hover {
    transform: scale(1.15);
}

.red-envelope.opened {
    opacity: 0.4;
    cursor: not-allowed;
}

.popup {
    position: fixed;
    inset: 0;
    background: transparent; /* bỏ nền đen */
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background-color: #ffffff !important;   /* Ép nền trắng */
    padding: 70px;
    border-radius: 25px;
    max-width: 850px;
    text-align: center;
    animation: popupZoom 0.4s ease;
    border: 6px solid #d4af37;
    box-shadow: 0 0 40px rgba(212,175,55,0.6);
}

/* Khi là LỘC VÀNG */
.popup-content.gold {
    background-color: #ffffff !important;
    border: 8px solid gold;
    box-shadow: 0 0 100px rgba(255,215,0,1);
    animation: popupZoom 0.4s ease, glowGold 1.2s infinite alternate;
}

.popup h2 {
    font-size: 48px;
    margin-bottom: 30px;
    color: #b30000;
    font-weight: bold;
}

.popup p {
    font-size: 30px;
    line-height: 1.6;
    color: #b30000;
}

.close-btn {
    margin-top: 35px;
    padding: 14px 35px;
    font-size: 22px;
    background: linear-gradient(45deg, #b30000, #ff0000);
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 10px;
    transition: 0.3s;
}

.close-btn:hover {
    transform: scale(1.1);
}

@keyframes popupZoom {
    from {transform: scale(0.7); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}

@keyframes glowGold {
    from {box-shadow: 0 0 40px rgba(255,215,0,0.6);}
    to {box-shadow: 0 0 120px rgba(255,215,0,1);}
}
@keyframes zoomIn {
    from {transform: scale(0.6); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}
</style>
</head>

<body>

<h1>🎉 CHẠM LÌ XÌ – MỞ LỘC XUÂN 🎉</h1>

<div class="grid">
    <img src="lixi.png" class="red-envelope" onclick="openLixi(0)">
    <img src="lixi.png" class="red-envelope" onclick="openLixi(1)">
    <img src="lixi.png" class="red-envelope" onclick="openLixi(2)">
    <img src="lixi.png" class="red-envelope" onclick="openLixi(3)">
    <img src="lixi.png" class="red-envelope" onclick="openLixi(4)">
</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h2 id="title"></h2>
        <p id="content"></p>
        <button class="close-btn" onclick="closePopup()">Đóng</button>
    </div>
</div>

<script>

// Danh sách phần thưởng
const prizes = [
{
title: "🎉 LỘC BỨT PHÁ 🎉",
content: "Xuân về khí thế dâng cao,<br>Đồng lòng bứt phá, tiến vào đỉnh cao."
},
{
title: "🎉 LỘC TIÊN PHONG 🎉",
content: "Xuân sang mở lối tiên phong,<br>Sáng tạo bứt phá, thành công rạng ngời."
},
{
title: "🎉 LỘC KẾT NỐI 🎉",
content: "Xuân này kết nối bền lâu,<br>Chung tay xây vững nhịp cầu niềm tin."
},
{
title: "🎉 LỘC ĐỒNG TÂM 🎉",
content: "Xuân về vững bước đồng tâm,<br>Chung lòng hiệp lực, nâng tầm thành công."
},
{
title: "🏆 LỘC VÀNG – 500.000đ 🏆",
content: "Xuân sang rực rỡ ánh vàng,<br>Tài lộc viên mãn, vững vàng thành công!"
}
];

// Hàm trộn mảng (shuffle)
function shuffle(array) {
for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
}
return array;
}

// Tạo mảng phần thưởng đã được random
const shuffledPrizes = shuffle([...prizes]);

function openLixi(index) {
const envelopes = document.querySelectorAll('.red-envelope');
if (envelopes[index].classList.contains('opened')) return;

envelopes[index].classList.add('opened');

document.getElementById("title").innerHTML = shuffledPrizes[index].title;
document.getElementById("content").innerHTML = shuffledPrizes[index].content;
document.getElementById("popup").style.display = "flex";
}

function closePopup() {
document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
