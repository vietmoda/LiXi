<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chạm Lì Xì – Mở Lộc Xuân 2026</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: url("background.png") no-repeat center center fixed;
    background-size: cover;
    text-align: center;
    color: white;
    overflow: hidden;
}

h1 {
    margin-top: 60px;
    font-size: 50px;
    text-shadow: 3px 3px 10px rgba(0,0,0,0.6);
}

.grid {
    display: flex;
    justify-content: center;
    gap: 70px;
    margin-top: 100px;
    flex-wrap: wrap;
}

.red-envelope {
    width: 160px;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.red-envelope:hover {
    transform: scale(1.15);
}

.red-envelope.opened {
    opacity: 0.4;
    cursor: not-allowed;
}

.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: white;
    color: #b30000;
    padding: 60px;
    border-radius: 20px;
    max-width: 800px;
    animation: zoomIn 0.4s ease;
}

.popup h2 {
    font-size: 42px;
    margin-bottom: 25px;
}

.popup p {
    font-size: 28px;
}

.close-btn {
    margin-top: 30px;
    padding: 12px 30px;
    font-size: 20px;
    background: #b30000;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 8px;
}

@keyframes zoomIn {
    from {transform: scale(0.6); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}

/* Canvas pháo hoa */
#fireworks {
    position: fixed;
    inset: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<h1>🎉 CHẠM LÌ XÌ – MỞ LỘC XUÂN 🎉</h1>

<div class="grid">
    <img src="lixi.png" class="red-envelope" onclick="openLixi(0)">
    <img src="lixi.png" class="red-envelope" onclick="openLixi(1)">
    <img src="lixi.png" class="red-envelope" onclick="openLixi(2)">
    <img src="lixi.png" class="red-envelope" onclick="openLixi(3)">
    <img src="lixi.png" class="red-envelope" onclick="openLixi(4)">
</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h2 id="title"></h2>
        <p id="content"></p>
        <button class="close-btn" onclick="closePopup()">Đóng</button>
    </div>
</div>

<canvas id="fireworks"></canvas>

<audio id="drumSound" src="https://assets.mixkit.co/sfx/preview/mixkit-drum-roll-566.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>

<script>
const goldenIndex = Math.floor(Math.random() * 5); // Random vị trí Lộc Vàng

const normalPrizes = [
"🎉 LỘC BỨT PHÁ 🎉|Xuân về khí thế dâng cao,<br>Đồng lòng bứt phá, tiến vào đỉnh cao.",
"🎉 LỘC TIÊN PHONG 🎉|Xuân sang mở lối tiên phong,<br>Sáng tạo bứt phá, thành công rạng ngời.",
"🎉 LỘC KẾT NỐI 🎉|Xuân này kết nối bền lâu,<br>Chung tay xây vững nhịp cầu niềm tin.",
"🎉 LỘC ĐỒNG TÂM 🎉|Xuân về vững bước đồng tâm,<br>Chung lòng hiệp lực, nâng tầm thành công."
];

let openedEnvelopes = [false, false, false, false, false];

function openLixi(index) {

    if (openedEnvelopes[index]) return; // Không mở lại bao đã mở

    openedEnvelopes[index] = true;

    document.getElementById("drumSound").play();

    const envelopes = document.querySelectorAll('.red-envelope');
    envelopes[index].classList.add('opened');

    let title, content;

    if (index === goldenIndex) {
        title = "🏆 LỘC VÀNG – 500.000đ 🏆";
        content = "Xuân sang rực rỡ ánh vàng,<br>Tài lộc viên mãn, vững vàng thành công!";
        document.getElementById("winSound").play();
        launchFireworks();
    } else {
        const prize = normalPrizes[index % normalPrizes.length].split("|");
        title = prize[0];
        content = prize[1];
    }

    document.getElementById("title").innerHTML = title;
    document.getElementById("content").innerHTML = content;
    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
