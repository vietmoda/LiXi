<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chạm QR – Mở Lộc Xuân 2026</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg,#b30000,#ff0000);
    color: white;
    text-align: center;
}

h1 {
    margin-top: 40px;
    font-size: 48px;
}

.grid {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    margin-top: 60px;
}

.red-envelope {
    width: 140px;
    height: 200px;
    background: gold;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: #b30000;
    font-size: 22px;
    transition: 0.3s;
}

.red-envelope:hover {
    transform: scale(1.1);
}

.red-envelope.opened {
    background: #555;
    color: #ccc;
    cursor: not-allowed;
}

.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: white;
    color: #b30000;
    padding: 50px;
    border-radius: 15px;
    max-width: 700px;
    animation: zoomIn 0.5s ease;
}

.popup h2 {
    font-size: 40px;
}

.popup p {
    font-size: 26px;
    line-height: 1.6;
}

.close-btn {
    margin-top: 30px;
    padding: 10px 25px;
    font-size: 18px;
    background: #b30000;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}

@keyframes zoomIn {
    from {transform: scale(0.5); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}
</style>
</head>

<body>

<h1>🎉 CHẠM LÌ XÌ – MỞ LỘC XUÂN 🎉</h1>

<div class="grid">
    <div class="red-envelope" onclick="openLixi(0)">LÌ XÌ</div>
    <div class="red-envelope" onclick="openLixi(1)">LÌ XÌ</div>
    <div class="red-envelope" onclick="openLixi(2)">LÌ XÌ</div>
    <div class="red-envelope" onclick="openLixi(3)">LÌ XÌ</div>
    <div class="red-envelope" onclick="openLixi(4)">LÌ XÌ</div>
</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h2 id="title"></h2>
        <p id="content"></p>
        <button class="close-btn" onclick="closePopup()">Đóng</button>
    </div>
</div>

<script>
const prizes = [
{
title: "🎉 LỘC BỨT PHÁ 🎉",
content: "Xuân về khí thế dâng cao,<br>Đồng lòng bứt phá, tiến vào đỉnh cao."
},
{
title: "🎉 LỘC TIÊN PHONG 🎉",
content: "Xuân sang mở lối tiên phong,<br>Sáng tạo bứt phá, thành công rạng ngời."
},
{
title: "🎉 LỘC KẾT NỐI 🎉",
content: "Xuân này kết nối bền lâu,<br>Chung tay xây vững nhịp cầu niềm tin."
},
{
title: "🎉 LỘC ĐỒNG TÂM 🎉",
content: "Xuân về vững bước đồng tâm,<br>Chung lòng hiệp lực, nâng tầm thành công."
},
{
title: "🏆 LỘC VÀNG – 500.000đ 🏆",
content: "Xuân sang rực rỡ ánh vàng,<br>Tài lộc viên mãn, vững vàng thành công!"
}
];

function openLixi(index) {
    const envelopes = document.querySelectorAll('.red-envelope');

    if (envelopes[index].classList.contains('opened')) return;

    envelopes[index].classList.add('opened');

    document.getElementById("title").innerHTML = prizes[index].title;
    document.getElementById("content").innerHTML = prizes[index].content;
    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
